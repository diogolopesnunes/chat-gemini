<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Particular com Gemini</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --gradient-accent: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            --gradient-card: linear-gradient(145deg, rgba(255, 255, 255, 0.95) 0%, rgba(248, 250, 252, 0.9) 100%);
            --color-bg: #0a0a1a;
            --color-text: #f8fafc;
            --color-muted: #a1a1aa;
            --color-user: #6366f1;
            --color-bot: #1e293b;
            --border-radius: 16px;
            --shadow-glow: 0 0 40px rgba(102, 126, 234, 0.3);
            --shadow-card: 0 10px 40px rgba(0, 0, 0, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--gradient-primary);
            background-attachment: fixed;
            color: var(--color-text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            max-height: 800px;
            display: grid;
            grid-template-rows: auto 1fr auto auto;
            gap: 20px;
            padding: 24px;
        }

        header {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: var(--border-radius);
            padding: 24px 32px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: var(--shadow-glow);
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #e0e0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        header p {
            margin-top: 8px;
            color: var(--color-muted);
            font-size: 0.95rem;
            font-weight: 500;
        }

        #chat {
            background: var(--gradient-card);
            backdrop-filter: blur(20px);
            border-radius: var(--border-radius);
            padding: 24px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: var(--shadow-card);
            scroll-behavior: smooth;
        }

        #chat::-webkit-scrollbar {
            width: 8px;
        }

        #chat::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }

        #chat::-webkit-scrollbar-thumb {
            background: var(--gradient-accent);
            border-radius: 4px;
        }

        .message {
            margin-bottom: 16px;
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 0.95rem;
            animation: messageSlide 0.4s ease-out;
            position: relative;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .message:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .user {
            background: linear-gradient(135deg, var(--color-user), #8b5cf6);
            color: white;
            margin-left: auto;
            max-width: 75%;
            border-bottom-right-radius: 4px;
        }

        .bot {
            background: var(--color-bot);
            color: #f1f5f9;
            margin-right: auto;
            max-width: 75%;
            border-bottom-left-radius: 4px;
        }

        .label {
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .user .label {
            color: rgba(255, 255, 255, 0.9);
        }

        .bot .label {
            color: #a5b4fc;
        }

        form {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            animation: fadeInUp 0.6s ease-out;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.95);
            font-size: 1rem;
            color: #1e293b;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        input::placeholder {
            color: #64748b;
        }

        button {
            padding: 16px 28px;
            border: none;
            border-radius: 16px;
            background: var(--gradient-accent);
            color: #0a0a1a;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 217, 255, 0.4);
            filter: brightness(1.05);
        }

        button:hover:not(:disabled)::before {
            left: 100%;
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: linear-gradient(135deg, #64748b, #475569);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        button:disabled::before {
            display: none;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }

        .secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--color-text);
            padding: 12px 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .secondary::before {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
                height: 95vh;
                gap: 16px;
            }

            header {
                padding: 20px;
            }

            header h1 {
                font-size: 1.4rem;
            }

            #chat {
                padding: 16px;
            }

            .message {
                padding: 14px 16px;
                font-size: 0.9rem;
            }

            .user, .bot {
                max-width: 85%;
            }

            form {
                flex-direction: column;
                gap: 10px;
            }

            button {
                width: 100%;
            }

            .secondary {
                width: auto;
                justify-self: end;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 12px;
                gap: 12px;
            }

            header {
                padding: 16px;
            }

            header h1 {
                font-size: 1.25rem;
            }

            #chat {
                padding: 12px;
            }

            input, button {
                padding: 14px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Chat Particular com Gemini</h1>
            <p>Responde usando os arquivos TXT da pasta context.</p>
        </header>
        <main id="chat">
            <div class="message bot">
                <span class="label">Assistente</span>
                Olá. Envie uma pergunta sobre o material TXT carregado.
            </div>
        </main>
        <form id="form">
            <div class="input-wrapper">
                <input id="message" type="text" placeholder="Digite sua pergunta..." autocomplete="off" />
            </div>
            <button id="send" type="submit">Enviar</button>
        </form>
        <div class="actions">
            <button class="secondary" id="reset" type="button">Limpar histórico</button>
        </div>
    </div>
    <script>
        const form = document.getElementById("form");
        const input = document.getElementById("message");
        const chat = document.getElementById("chat");
        const sendButton = document.getElementById("send");
        const resetButton = document.getElementById("reset");

        function addMessage(type, text) {
            const div = document.createElement("div");
            div.className = `message ${type}`;
            const label = document.createElement("span");
            label.className = "label";
            label.textContent = type === "user" ? "Você" : "Assistente";
            const content = document.createElement("div");
            content.textContent = text;
            div.appendChild(label);
            div.appendChild(content);
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            const message = input.value.trim();
            if (!message) {
                return;
            }
            addMessage("user", message);
            input.value = "";
            sendButton.disabled = true;
            sendButton.textContent = "Enviando...";
            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ message }),
                });
                const data = await response.json();
                if (!response.ok) {
                    addMessage("bot", data.error || "Erro ao processar a resposta.");
                    return;
                }
                addMessage("bot", data.answer);
            } catch (error) {
                addMessage("bot", "Erro de conexão com o servidor.");
            } finally {
                sendButton.disabled = false;
                sendButton.textContent = "Enviar";
                input.focus();
            }
        });

        resetButton.addEventListener("click", async () => {
            await fetch("/api/reset", {
                method: "POST",
            });
            chat.innerHTML = "";
            addMessage(
                "bot",
                "Histórico apagado. Envie uma nova pergunta sobre o material TXT."
            );
        });
    </script>
</body>
</html>
